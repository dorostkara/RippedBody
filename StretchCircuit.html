<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stretch Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --lower: #0e8a7a;
    --upper: #3a7ae8;
    --cycling: #2daa6e;
    --rest: #7c5cbf;
    --bg: #f7f4ef;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #888;
    --border: #e0dbd3;
    --radius: 16px;
    --accent: var(--lower);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  /* ── HEADER ── */
  .header { text-align: center; margin-bottom: 20px; }
  .header-label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 13vw, 72px); line-height: 0.9; color: var(--text); }
  .header h1 span { color: var(--accent); transition: color 0.3s; }
  .meta-row { display: flex; justify-content: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .meta-pill { border-radius: 100px; padding: 5px 14px; font-size: 12px; font-weight: 500; color: #fff; transition: background 0.3s; }
  .meta-pill strong { opacity: 0.75; }

  /* ── TABS ── */
  .tabs { display: flex; gap: 6px; margin-bottom: 20px; justify-content: center; }
  .tab {
    flex: 1; max-width: 110px; padding: 9px 4px;
    border-radius: 50px; border: 2px solid transparent;
    background: var(--card); font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .tab.lower   { color: var(--lower);   border-color: var(--lower); }
  .tab.upper   { color: var(--upper);   border-color: var(--upper); }
  .tab.cycling { color: var(--cycling); border-color: var(--cycling); }
  .tab.rest    { color: var(--rest);    border-color: var(--rest); }
  .tab.lower.active   { background: var(--lower);   color: #fff; }
  .tab.upper.active   { background: var(--upper);   color: #fff; }
  .tab.cycling.active { background: var(--cycling); color: #fff; }
  .tab.rest.active    { background: var(--rest);    color: #fff; }
  .tab:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── TIMER SECTION ── */
  .timer-section {
    border-radius: 20px; padding: 22px 20px 18px;
    margin-bottom: 20px; text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    transition: background 0.3s;
  }

  .dot-row { display: flex; justify-content: center; gap: 7px; margin-bottom: 12px; flex-wrap: wrap; min-height: 12px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: background 0.3s; }
  .dot.active { background: #fff; }
  .dot.done   { background: rgba(255,255,255,0.45); }

  .timer-label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 2px; min-height: 16px; }
  .timer-label.switch-mode { color: #ffe082; }

  .timer-display { font-family: 'Bebas Neue', sans-serif; font-size: 96px; line-height: 1; color: #fff; letter-spacing: 4px; }
  .timer-display.switch-mode { color: #ffe082; }

  .timer-name { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: rgba(255,255,255,0.85); letter-spacing: 1px; margin: 4px 0 2px; min-height: 30px; }
  .timer-side { font-size: 12px; color: rgba(255,255,255,0.55); letter-spacing: 2px; text-transform: uppercase; min-height: 18px; margin-bottom: 4px; }
  .timer-progress { font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 14px; min-height: 18px; }

  .pbar-wrap { height: 5px; background: rgba(255,255,255,0.15); border-radius: 5px; margin-bottom: 18px; overflow: hidden; }
  .pbar-fill { height: 100%; border-radius: 5px; transition: width 1s linear; width: 0%; background: rgba(255,255,255,0.7); }

  .btn-row { display: flex; gap: 10px; justify-content: center; }
  .btn { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; padding: 12px 28px; border-radius: 10px; border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-primary   { background: #fff; }
  .btn-secondary { background: rgba(255,255,255,0.15); color: #fff; }
  .btn-danger    { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.65); }

  /* ── EXERCISE LIST ── */
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 4px; color: var(--muted); margin-bottom: 10px; padding-left: 2px; }

  .ex-list { display: flex; flex-direction: column; gap: 8px; }

  .ex-card {
    background: var(--card); border: 2px solid var(--border);
    border-radius: 12px; padding: 13px 14px;
    display: flex; align-items: center; gap: 12px;
    transition: border-color 0.2s, background 0.2s;
    position: relative; overflow: hidden;
  }

  .ex-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; opacity: 0; transition: opacity 0.2s; }
  .ex-card.active-ex { border-color: transparent; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .ex-card.active-ex::before { opacity: 1; }
  .ex-card.done-ex { opacity: 0.45; }

  .ex-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--muted); min-width: 28px; }
  .ex-card.active-ex .ex-num { color: inherit; }

  .ex-info { flex: 1; }
  .ex-name { font-weight: 600; font-size: 0.9rem; }
  .ex-note { font-size: 0.74rem; color: var(--muted); margin-top: 2px; line-height: 1.4; }

  .ex-dur { font-size: 0.72rem; font-weight: 700; padding: 3px 8px; border-radius: 20px; white-space: nowrap; text-align: center; flex-shrink: 0; }

  /* ── DONE OVERLAY ── */
  .done-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(247,244,239,0.97);
    flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; text-align: center; padding: 32px;
  }
  .done-overlay.show { display: flex; }
  .done-title { font-family: 'Bebas Neue', sans-serif; font-size: 72px; line-height: 1; margin-bottom: 12px; }
  .done-sub { color: var(--muted); font-size: 15px; margin-bottom: 28px; }

  /* ── PHASE DIVIDER IN LIST ── */
  .phase-divider { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); padding: 14px 2px 4px; font-weight: 600; }
</style>
</head>
<body>

<div class="header">
  <p class="header-label">Pre-Bed Recovery</p>
  <h1>STRETCH<br><span id="dayLabel">LOWER</span></h1>
  <div class="meta-row">
    <span class="meta-pill" id="pillStretches" style="background:var(--lower)"><strong>13</strong> Stretches</span>
    <span class="meta-pill" id="pillTime"      style="background:var(--lower)"><strong>~27</strong> Min</span>
  </div>
</div>

<div class="tabs">
  <button class="tab lower active"   onclick="switchDay('lower')">🦵 Lower</button>
  <button class="tab upper"          onclick="switchDay('upper')">💪 Upper</button>
  <button class="tab cycling"        onclick="switchDay('cycling')">🚴 Cycling</button>
  <button class="tab rest"           onclick="switchDay('rest')">😴 Rest</button>
</div>

<!-- TIMER -->
<div class="timer-section" id="timerSection" style="background:var(--lower)">
  <div class="dot-row"    id="dotRow"></div>
  <div class="timer-label" id="timerLabel">READY</div>
  <div class="timer-display" id="timerDisplay">—</div>
  <div class="timer-name"   id="timerName">Press Start</div>
  <div class="timer-side"   id="timerSide"></div>
  <div class="timer-progress" id="timerProgress"></div>
  <div class="pbar-wrap"><div class="pbar-fill" id="pbarFill"></div></div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btnStart"  onclick="startTimer()" style="color:var(--lower)">START</button>
    <button class="btn btn-secondary" id="btnPause" onclick="pauseTimer()" style="display:none">PAUSE</button>
    <button class="btn btn-danger"  onclick="resetTimer()">RESET</button>
  </div>
</div>

<p class="section-title">Exercises</p>
<div class="ex-list" id="exList"></div>

<div class="done-overlay" id="doneOverlay">
  <div class="done-title" id="doneTitle" style="color:var(--lower)">DONE!</div>
  <div class="done-sub" id="doneSub">Great work. Sleep well 💤</div>
  <button class="btn btn-primary" id="doneBtn" onclick="resetTimer()" style="font-size:20px;padding:14px 36px;">RESTART</button>
</div>

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const DAYS = {
  lower: {
    label: 'LOWER', color: '#0e8a7a', time: '~27', phases: [
      { phase: '🔥 Foam Roll', stretches: [
        { name: 'Quads',       note: 'Face down, roll hip to knee. Pause on knots',            dur: 90, bilateral: true },

      ]},
      { phase: '🧘 Static Stretches', stretches: [

        { name: 'Glutes Figure 4',        note: 'On back, cross ankle over opposite knee, pull toward chest',       dur: 90, bilateral: true },
        { name: 'Inner Thighs Butterfly', note: 'Soles together, gently press knees toward floor',                  dur: 60, bilateral: false },
        { name: 'Standing Quad Stretch',  note: 'Hold ankle behind you, knees together, stand tall',                dur: 45, bilateral: true },
        { name: 'Calf Wall Stretch',      note: 'Heel flat on floor, lean into wall',                               dur: 45, bilateral: true },

        { name: "Child's Pose",           note: 'Arms extended, sink hips to heels. Slow deep breaths',             dur: 60, bilateral: false },
        { name: 'Cat-Cow',                note: '10 slow breaths — arch on inhale, round on exhale',                dur: 60, bilateral: false },
      ]},
    ]
  },
  upper: {
    label: 'UPPER', color: '#3a7ae8', time: '~24', phases: [
      { phase: '🔥 Foam Roll', stretches: [
        { name: 'Upper Back / Thoracic', note: 'Arms crossed over chest, roll mid-back. Pause on stiff segments', dur: 90, bilateral: false },
        { name: 'Lats',                  note: 'Lie on side, roll from armpit to mid-back',                        dur: 90, bilateral: true },
        { name: 'Pecs / Chest',          note: 'Arm out to side, roll pec area gently',                            dur: 60, bilateral: true },
      ]},
      { phase: '🧘 Static Stretches', stretches: [
        { name: 'Chest Doorway Stretch',    note: 'Arms at 90°, lean gently through doorframe. Exhale into it',          dur: 90, bilateral: false },
        { name: 'Lat Overhead Stretch',     note: 'Arms overhead, clasp hands, lean side to side',                       dur: 60, bilateral: true },
        { name: 'Cross-Body Shoulder',      note: 'Pull arm across chest, hold at elbow',                                dur: 45, bilateral: true },
        { name: 'Triceps Overhead',         note: 'Elbow behind head, gently press down with other hand',                dur: 45, bilateral: true },
        { name: 'Biceps Wall Stretch',      note: 'Palm on wall thumb down, slowly rotate body away',                    dur: 45, bilateral: true },
        { name: 'Thread the Needle',        note: 'On all fours, slide one arm under body until shoulder touches floor', dur: 60, bilateral: true },
        { name: 'Neck Side Stretch',        note: 'Ear toward shoulder, light hand pressure. Breathe slowly',            dur: 45, bilateral: true },
        { name: 'Wrist Flexor & Extensor',  note: 'Arm straight, bend wrist up then down. Hold each position',           dur: 30, bilateral: true },
        { name: "Child's Pose Side Reach",  note: 'Walk hands left then right to open lats. Slow breaths',               dur: 60, bilateral: false },
        { name: 'Cat-Cow',                  note: '10 slow breaths — arch on inhale, round on exhale',                   dur: 60, bilateral: false },
      ]},
    ]
  },
  cycling: {
    label: 'CYCLING', color: '#2daa6e', time: '~26', phases: [
      { phase: '🔥 Foam Roll', stretches: [
        { name: 'Quads',                 note: 'Face down, roll hip to knee. Biggest priority after cycling', dur: 90, bilateral: true },
        { name: 'Calves',                note: 'Slow roll, ankle to knee. Heavily used in pedaling',          dur: 90, bilateral: true },
        { name: 'Upper Back / Thoracic', note: 'Arms crossed, roll mid-back. Counteracts hunched posture',    dur: 90, bilateral: false },
        { name: 'Glutes / Piriformis',   note: 'Lean on hip, cross leg over',                                 dur: 60, bilateral: true },
      ]},
      { phase: '🧘 Static Stretches', stretches: [
        { name: 'Hip Flexor Lunge',       note: 'Knee on floor, push hips forward, squeeze glute. Critical after cycling', dur: 90, bilateral: true },
        { name: 'Chest Doorway Stretch',  note: 'Arms at 90°, lean through doorframe. Reverses hunched bike posture',       dur: 90, bilateral: false },
        { name: 'Hamstring Forward Fold', note: 'Legs straight, back flat, reach forward. Exhale and sink deeper',          dur: 90, bilateral: false },
        { name: 'Calf Wall Stretch',      note: 'Heel flat on floor, lean into wall',                                       dur: 60, bilateral: true },
        { name: 'Neck Side Stretch',      note: 'Ear toward shoulder — relieves tension from riding posture',                dur: 45, bilateral: true },
        { name: 'Glutes Figure 4',        note: 'On back, cross ankle over opposite knee, pull toward chest',               dur: 60, bilateral: true },
        { name: 'Supine Spinal Twist',    note: 'On back, pull knee across body, arms out wide',                            dur: 60, bilateral: true },
        { name: "Child's Pose",           note: 'Arms extended, sink hips to heels. Slow deep breaths',                     dur: 60, bilateral: false },
      ]},
    ]
  },
  rest: {
    label: 'REST DAY', color: '#7c5cbf', time: '~20', phases: [
      { phase: '🔥 Foam Roll (gentle)', stretches: [
        { name: 'Upper Back',             note: 'Slow gentle roll, arms crossed. No need to pause hard on knots',  dur: 60, bilateral: false },
        { name: 'Glutes',                 note: 'Light pressure only — lean on hip, cross leg over',               dur: 60, bilateral: true },
        { name: 'Quads or Hamstrings',    note: 'Roll whichever feels tightest from the week. Gentle pace',        dur: 60, bilateral: true },
      ]},
      { phase: '🧘 Full Body Static', stretches: [
        { name: 'Hip Flexor Lunge',       note: 'Knee on floor, push hips forward. Focus on breathing, no forcing', dur: 60, bilateral: true },
        { name: 'Hamstring Forward Fold', note: 'Legs straight, hinge from hips. Relax into it — no pushing today', dur: 60, bilateral: false },
        { name: 'Glutes Figure 4',        note: 'On back, cross ankle over opposite knee. Breathe slowly',          dur: 60, bilateral: true },
        { name: 'Chest Doorway Stretch',  note: 'Arms at 90°, gentle lean. Just open the chest',                   dur: 60, bilateral: false },
        { name: 'Cross-Body Shoulder',    note: 'Pull arm across chest gently',                                     dur: 45, bilateral: true },
        { name: 'Neck Side Stretch',      note: 'Ear toward shoulder, very light hand pressure',                    dur: 45, bilateral: true },
        { name: 'Supine Spinal Twist',    note: 'On back, pull knee across body. Let gravity do the work',          dur: 60, bilateral: true },
        { name: "Child's Pose",           note: 'Arms extended, sink hips to heels. 5 long slow breaths',           dur: 60, bilateral: false },
        { name: 'Cat-Cow',                note: '10 slow breaths — arch on inhale, round on exhale. Sleep well',    dur: 60, bilateral: false },
      ]},
    ]
  }
};

// ─────────────────────────────────────────────
// FLATTEN STRETCHES per day into a sequence of steps
// Each bilateral stretch becomes: [left, switch3s, right]
// ─────────────────────────────────────────────
function flattenSteps(dayKey) {
  const steps = [];
  DAYS[dayKey].phases.forEach(p => {
    p.stretches.forEach(s => {
      if (s.bilateral) {
        steps.push({ name: s.name, note: s.note, dur: s.dur, side: 'LEFT SIDE',  type: 'hold', stretchIdx: steps.length });
        steps.push({ name: s.name, note: '',      dur: 3,    side: 'SWITCH SIDES', type: 'switch' });
        steps.push({ name: s.name, note: s.note, dur: s.dur, side: 'RIGHT SIDE', type: 'hold', stretchIdx: steps.length });
      } else {
        steps.push({ name: s.name, note: s.note, dur: s.dur, side: '',           type: 'hold', stretchIdx: steps.length });
      }
    });
  });
  return steps;
}

// Flatten all stretches (ignoring switch steps) for the list
function getStretches(dayKey) {
  const list = [];
  DAYS[dayKey].phases.forEach(p => {
    list.push({ phase: p.phase });
    p.stretches.forEach(s => list.push(s));
  });
  return list;
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentDay  = 'lower';
let steps       = [];
let stepIdx     = 0;
let timeLeft    = 0;
let running     = false;
let interval    = null;

// ─────────────────────────────────────────────
// AUDIO
// ─────────────────────────────────────────────
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, duration, type='sine', vol=0.3) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
function playStart()    { beep(880,0.12,'square',0.28); setTimeout(()=>beep(1100,0.18,'square',0.3),130); }
function playSwitch()   { beep(660,0.1,'sine',0.25); setTimeout(()=>beep(880,0.15,'sine',0.25),120); }
function playNext()     { beep(550,0.1,'sine',0.22); setTimeout(()=>beep(770,0.18,'sine',0.25),120); }
function playCountdown(){ beep(660,0.08,'sine',0.2); }
function playDone()     { beep(880,0.1); setTimeout(()=>beep(1100,0.1),120); setTimeout(()=>beep(1320,0.35),240); }

// ─────────────────────────────────────────────
// SWITCH DAY
// ─────────────────────────────────────────────
function switchDay(day) {
  if (running) return;
  currentDay = day;
  const col = DAYS[day].color;

  // update CSS var
  document.documentElement.style.setProperty('--accent', col);

  // header
  document.getElementById('dayLabel').textContent = DAYS[day].label;
  document.getElementById('dayLabel').style.color = col;

  // count stretches (non-phase items)
  let count = 0;
  DAYS[day].phases.forEach(p => count += p.stretches.length);
  document.getElementById('pillStretches').innerHTML = `<strong>${count}</strong> Stretches`;
  document.getElementById('pillStretches').style.background = col;
  document.getElementById('pillTime').innerHTML = `<strong>${DAYS[day].time}</strong> Min`;
  document.getElementById('pillTime').style.background = col;

  // tabs
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab.' + day).classList.add('active');

  // timer section color
  document.getElementById('timerSection').style.background = col;
  document.getElementById('btnStart').style.color = col;
  document.getElementById('doneTitle').style.color = col;
  document.getElementById('doneBtn').style.color   = col;

  // ex-card accent
  document.querySelectorAll('.ex-card::before');

  buildList();
  resetTimer(true);
}

// ─────────────────────────────────────────────
// BUILD EXERCISE LIST
// ─────────────────────────────────────────────
function buildList() {
  const col = DAYS[currentDay].color;
  const items = getStretches(currentDay);
  let strIdx = 0;
  const html = items.map(item => {
    if (item.phase) {
      return `<div class="phase-divider">${item.phase}</div>`;
    }
    const i = strIdx++;
    const durLabel = item.bilateral ? `${item.dur}s × 2` : `${item.dur}s`;
    return `
      <div class="ex-card" id="excard-${i}" style="--card-accent:${col}">
        <div class="ex-num" id="exnum-${i}">${String(i+1).padStart(2,'0')}</div>
        <div class="ex-info">
          <div class="ex-name">${item.name}</div>
          <div class="ex-note">${item.note}</div>
        </div>
        <div class="ex-dur" style="background:${col}18;color:${col}">${durLabel}</div>
      </div>`;
  }).join('');
  document.getElementById('exList').innerHTML = html;

  // apply accent border via inline style since ::before can't be set via JS easily
  document.querySelectorAll('.ex-card').forEach(c => {
    c.style.setProperty('--card-accent', col);
  });

  // rebuild dots
  buildDots(strIdx);
}

// ─────────────────────────────────────────────
// DOTS — one per stretch (not per step)
// ─────────────────────────────────────────────
function buildDots(count) {
  if (!count) {
    let c = 0; DAYS[currentDay].phases.forEach(p => c += p.stretches.length);
    count = c;
  }
  document.getElementById('dotRow').innerHTML =
    Array.from({length: count}, (_,i) => `<div class="dot" id="dot${i}"></div>`).join('');
}

function updateDots(stretchIdx) {
  let c = 0; DAYS[currentDay].phases.forEach(p => c += p.stretches.length);
  for (let i = 0; i < c; i++) {
    const d = document.getElementById('dot'+i);
    if (!d) continue;
    d.className = 'dot' + (i < stretchIdx ? ' done' : i === stretchIdx ? ' active' : '');
  }
}

// ─────────────────────────────────────────────
// TIMER CONTROLS
// ─────────────────────────────────────────────
function startTimer() {
  try { getAudio().resume(); } catch(e){}
  if (running) return;
  steps    = flattenSteps(currentDay);
  stepIdx  = 0;
  running  = true;
  document.querySelectorAll('.tab').forEach(t => t.disabled = true);
  document.getElementById('btnStart').style.display = 'none';
  document.getElementById('btnPause').style.display = 'inline-block';
  loadStep();
  playStart();
  interval = setInterval(tick, 1000);
}

function pauseTimer() {
  if (running) {
    clearInterval(interval);
    running = false;
    document.getElementById('btnPause').textContent = 'RESUME';
  } else {
    running = true;
    document.getElementById('btnPause').textContent = 'PAUSE';
    interval = setInterval(tick, 1000);
  }
}

function resetTimer(silent) {
  clearInterval(interval);
  running  = false;
  stepIdx  = 0;
  steps    = [];
  document.querySelectorAll('.tab').forEach(t => t.disabled = false);
  document.getElementById('btnStart').style.display  = 'inline-block';
  document.getElementById('btnPause').style.display  = 'none';
  document.getElementById('btnPause').textContent    = 'PAUSE';
  document.getElementById('timerLabel').textContent  = 'READY';
  document.getElementById('timerLabel').className    = 'timer-label';
  document.getElementById('timerDisplay').textContent = '—';
  document.getElementById('timerDisplay').className  = 'timer-display';
  document.getElementById('timerName').textContent   = 'Press Start';
  document.getElementById('timerSide').textContent   = '';
  document.getElementById('timerProgress').textContent = '';
  document.getElementById('pbarFill').style.width    = '0%';
  document.getElementById('doneOverlay').classList.remove('show');
  document.querySelectorAll('.ex-card').forEach(c => { c.classList.remove('active-ex','done-ex'); });
  updateDots(-1);
}

// ─────────────────────────────────────────────

// Pre-compute stretch number for each step
function computeStretchNums() {
  let num = 0;
  steps.forEach((s, i) => {
    if (s.type === 'hold' && (i === 0 || steps[i-1].type !== 'switch')) {
      s.stretchNum = num++;
    } else if (s.type === 'switch') {
      s.stretchNum = steps[i-1].stretchNum;
    } else if (s.type === 'hold' && steps[i-1].type === 'switch') {
      s.stretchNum = steps[i-1].stretchNum;
    }
  });
}

function loadStep() {
  computeStretchNums();
  const step = steps[stepIdx];
  timeLeft = step.dur;

  const isSwitch = step.type === 'switch';
  document.getElementById('timerLabel').textContent = isSwitch ? 'SWITCH SIDES' : 'HOLD';
  document.getElementById('timerLabel').className   = 'timer-label' + (isSwitch ? ' switch-mode' : '');
  document.getElementById('timerDisplay').textContent = timeLeft;
  document.getElementById('timerDisplay').className   = 'timer-display' + (isSwitch ? ' switch-mode' : '');
  document.getElementById('timerName').textContent  = step.name;
  document.getElementById('timerSide').textContent  = step.side || '';

  // count stretches total
  let totalStretches = 0; DAYS[currentDay].phases.forEach(p => totalStretches += p.stretches.length);
  const sNum = step.stretchNum !== undefined ? step.stretchNum : 0;
  document.getElementById('timerProgress').textContent = `Stretch ${sNum + 1} of ${totalStretches}`;

  updateDots(sNum);

  // highlight exercise card
  document.querySelectorAll('.ex-card').forEach((c, i) => {
    c.classList.remove('active-ex');
    if (i < sNum) c.classList.add('done-ex'); else c.classList.remove('done-ex');
  });
  const activeCard = document.getElementById('excard-' + sNum);
  if (activeCard) {
    activeCard.classList.add('active-ex');
    activeCard.classList.remove('done-ex');
    // inject border color
    const col = DAYS[currentDay].color;
    activeCard.style.borderLeftColor = col;
    activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  updatePbar();
}

function updatePbar() {
  const step = steps[stepIdx];
  const elapsed = step.dur - timeLeft;
  const pct = (elapsed / step.dur) * 100;
  document.getElementById('pbarFill').style.width = pct + '%';
}

// ─────────────────────────────────────────────
// TICK
// ─────────────────────────────────────────────
function tick() {
  if (timeLeft <= 1) {
    stepIdx++;
    if (stepIdx >= steps.length) {
      // ALL DONE
      clearInterval(interval);
      running = false;
      document.getElementById('doneOverlay').classList.add('show');
      playDone();
      return;
    }
    const nextStep = steps[stepIdx];
    if (nextStep.type === 'switch') {
      playSwitch();
    } else if (steps[stepIdx - 1] && steps[stepIdx - 1].type === 'switch') {
      // coming off a switch — no extra sound, switch already played
    } else {
      playNext();
    }
    loadStep();
    return;
  }

  timeLeft--;
  document.getElementById('timerDisplay').textContent = timeLeft;
  updatePbar();

  // countdown beeps for last 3 seconds of hold (not switch)
  if (steps[stepIdx].type === 'hold' && timeLeft <= 3 && timeLeft > 0) playCountdown();
}
